# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
# 
# 使用方式:
#   定时模式: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI模式: docker-compose -f ./docker/docker-compose.yml up -d server
#   同时启动: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../litellm_config.yaml:/app/litellm_config.yaml:ro
    - ../strategies:/app/strategies:ro
    # 如需覆盖前端静态资源，可挂载本地 static 目录
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT 从 .env 文件读取，无需在此硬编码

    # Docker 默认启用根目录 litellm_config.yaml；
    # 主模型和 fallback 路由由 .env 中的 LITELLM_MODEL / LITELLM_FALLBACK_MODELS 控制。
    # LLM Provider Key 由 env_file 加载的 .env 提供，供 YAML 中的 os.environ/<VAR> 引用。
    - LITELLM_CONFIG=/app/litellm_config.yaml

    # 代理设置（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 资源限制
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定时任务模式
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # 若使用 network_mode: host，则以下 ports 映射无效，端口由 command 中的 --port 指定
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      - TZ=Asia/Shanghai
      - LITELLM_CONFIG=/app/litellm_config.yaml
      - WEBUI_HOST=0.0.0.0
      # 允许 server 读取 sentinel DB（sentinel Docker 负责写入，server 只读）
      # .env 中的 SENTINEL_ENABLED=false 会被此处覆盖，仅影响读取行为
      - SENTINEL_ENABLED=true
      - SENTINEL_DB_PATH=/app/data/sentinel.db

  # RSSHub — 为没有原生 RSS 的中国财经网站合成 RSS 源
  # 财联社、证券时报、新浪财经、东方财富等均走此服务
  # 参考: https://docs.rsshub.app/deploy/
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      # 可选：设置访问密钥防止公网滥用
      # - ACCESS_KEY=${RSSHUB_ACCESS_KEY:-}
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # News Sentinel — 主动新闻抓取服务（周期抓取 + SQLite 存储）
  # 依赖 rsshub 提供中国财经 RSS 源；与主服务共享 /app/data 卷
  sentinel:
    <<: *common
    container_name: stock-sentinel
    command: ["python", "-m", "src.services.sentinel.service", "--loop"]
    environment:
      - TZ=Asia/Shanghai
      - LITELLM_CONFIG=/app/litellm_config.yaml
      - WEBUI_HOST=0.0.0.0
      # Sentinel 专用配置（覆盖 .env 中的默认值）
      - SENTINEL_ENABLED=true
      - SENTINEL_RSSHUB_BASE_URL=http://rsshub:1200
      - SENTINEL_DB_PATH=/app/data/sentinel.db
    depends_on:
      - rsshub
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
