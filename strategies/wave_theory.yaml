# Elliott Wave Theory Strategy / 波浪理论
# 5-wave impulse + 3-wave corrective pattern analysis for trend and position sizing.
# Optimized v2: Practical wave counting rules, volume-per-wave analysis,
# invalidation criteria, and multi-scenario probability assessment.

name: wave_theory
display_name: 波浪理论
description: 基于艾略特波浪理论，含实用计数规则、波量分析、失效条件与多情景概率评估。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [波浪, 波浪理论, 艾略特]
default_priority: 80
market_regimes: [volatile]

instructions: |
  **波浪理论 v2（Elliott Wave Theory — Practical Edition）**
  
  版本说明：原版波浪理论高度依赖主观计数。v2 增加**铁律验证 + 概率化情景**，让 LLM 可实际执行。
  
  ---
  
  ## 0. 三大铁律（违反任一条 → 计数无效，重新归数）
  
  | 铁律 | 规则 | 验证方法 |
  |------|------|----------|
  | **铁律 1** | 第 2 浪不得跌破第 1 浪起点 | 取第1浪起点价 vs 第2浪最低价 |
  | **铁律 2** | 第 3 浪绝不能是推动浪中最短的一浪 | 比较1/3/5浪长度 |
  | **铁律 3** | 第 4 浪不得进入第 1 浪价格区域 | 取第1浪终点 vs 第4浪最低点 |
  
  **铁律违反时的处理**：归数必定错误，重新从更大或更小级别计数。
  
  ---
  
  ## Step 1: 启动浪识别（第 1 浪）
  
  使用 `get_daily_history`（120 日），从最近一个显著低点开始计数：
  
  **第 1 浪特征**：
  - 前期有清晰下跌趋势（跌幅 > 15%、持续 > 20 日）。
  - 第 1 浪涨幅通常 10-30%。
  - 成交量温和放大（量比 1.0-1.5），不会爆量。
  - MACD 从零轴下方首次金叉。
  - 市场普遍仍持怀疑态度（新闻中性偏空）。
  
  **第 1 浪确认**：若之后出现回调（第 2 浪），且回调不破第 1 浪起点 → 确认 1 浪。
  
  ---
  
  ## Step 2: 各浪识别 + Volume Characteristics
  
  | 浪型 | 价格特征 | Volume Characteristics | 持续时间（参考） |
  |------|----------|----------|-----------------|
  | 第 1 浪 | 涨幅 10-30%，缓慢启动 | 温和放量（量比 1.0-1.5） | 5-15 日 |
  | 第 2 浪 | 回撤 38.2%-61.8% | 缩量（量比 < 0.7） | 3-10 日 |
  | 第 3 浪 | 涨幅最大（常 30-60%），斜率陡 | 大幅放量（量比 > 1.5） | 10-25 日 |
  | 第 4 浪 | 横盘或浅调（23.6%-38.2%），复杂 | 缩量整理 | 5-15 日 |
  | 第 5 浪 | 涨幅减弱，创新高但乏力 | 量能背离（价涨量缩） | 3-10 日 |
  | A 浪 | 首次下跌，力度较大 | 放量下跌 | 3-8 日 |
  | B 浪 | 反弹，力度弱于前涨幅 | 缩量（陷阱！） | 3-8 日 |
  | C 浪 | 加速下跌，幅度 ≥ A 浪 | 放量 | 5-15 日 |
  
  **各浪量能验证方法**：
  - 第 3 浪日均量 > 第 1 浪日均量 → 验证通过。
  - 第 5 浪日均量 < 第 3 浪日均量 → 顶背离预警。
  - B 浪量能 < A 浪前上涨段量能的 50% → B 浪确认。
  
  ---
  
  ## Step 3: 概率化情景分析（替代唯一计数）
  
  由于波浪计数的多解性，应列出 2-3 种可能情景及其概率：
  
  **情景 A — 主计数（概率 50-60%）**：
  当前最可能的浪型位置，给出依据。
  
  **情景 B — 替代计数（概率 25-35%）**：
  若某些假设不同得出的替代计数。
  
  **情景 C — 小概率情景（概率 10-15%）**：
  极端情况或最小可能计数。
  
  **情景对比关键**：找出所有情景的**共同结论**（如：无论如何，短期都处于调整中 = 观望）。
  
  ---
  
  ## Step 4: 各浪实战Action Matrix
  
  | 当前位置 | 操作 | 仓位 | 止损 | 目标 |
  |----------|------|------|------|------|
  | 第 2 浪底部 | 重仓买入 | 5-7 成 | 第 1 浪起点 -2% | 第 3 浪 1.618 延伸 |
  | 第 3 浪初期 | 加仓 | 3-5 成 | 第 2 浪低点 | 第 3 浪 2.618 延伸 |
  | 第 3 浪中段 | 持有 | 维持 | 移动止损 | 持有 |
  | 第 4 浪底部 | 加仓 | 2-3 成 | 第 1 浪终点 | 第 5 浪目标 |
  | 第 5 浪中后段 | 减仓 | 减至 1-2 成 | -3% | 分批止盈 |
  | B 浪反弹 | 不参与！ | 0 | — | 等待 C 浪结束 |
  | C 浪末端 + 底背驰 | 逐步建仓 | 2-3 成 | C 浪低点 -2% | 新一轮 1 浪 |
  
  ---
  
  ## Step 5: Fibonacci Targets & Support
  
  - **第 2 浪回撤**：38.2% / 50% / 61.8% of Wave 1。
  - **第 3 浪目标**：1.618 / 2.0 / 2.618 × Wave 1。
  - **第 4 浪回撤**：23.6% / 38.2% of Wave 3（不超过 50%）。
  - **第 5 浪目标**：0.618 / 1.0 × (Wave 1 + Wave 3) 或 Wave 3 × 0.618 加在 Wave 4 终点。
  - **C 浪目标**：1.0 / 1.618 × Wave A。
  
  ---
  
  ## Step 6: Invalidation Conditions（计数作废）
  
  - 价格跌破第 1 浪起点 → 不是推动浪，可能是更大级别调整。
  - 第 4 浪进入第 1 浪区域 → 计数错误。
  - 第 3 浪短于第 1 浪 → 计数错误。
  - 当前走势不符合所有情景的概率分布 → 放弃波浪分析，改用其他策略。
  
  ---
  
  ## Output Requirements
  
  - 主计数情景及当前浪型（给出依据）。
  - 替代计数情景（至少 1 个）。
  - 三大铁律验证结果。
  - 各浪量能验证结果。
  - 关键斐波那契位（支撑/阻力/目标）。
  - 概率分布及共同结论。
  - 计数置信度（高/中/低）。
  
  ---
  
  **Score Adjustments:**
  - 第 2 浪底部 + 缩量企稳 + 铁律全通过：`sentiment_score +18`
  - 第 3 浪确认突破（量能验证）：`sentiment_score +15`
  - 第 4 浪底部企稳：`sentiment_score +8`
  - 第 5 浪末端 + 顶背离：`sentiment_score -12`
  - C 浪下跌中：`sentiment_score -15`
  - B 浪反弹（陷阱）：`sentiment_score -5`（不参与）
  - 多情景共同指向买入 → 额外 `+3`
  - 多情景矛盾 → `sentiment_score -3`（不确定时不操作）
  
