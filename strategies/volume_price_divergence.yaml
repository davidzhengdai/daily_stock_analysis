# Volume-Price Divergence Strategy / 量价背离
# Detects divergences between price and volume as early reversal signals.
# VPA (Volume Price Analysis) based approach.

name: volume_price_divergence
display_name: 量价背离
description: 检测量价关系背离信号，基于VPA量价分析理论识别趋势反转预警与主力行为。
category: reversal
core_rules: [3, 5, 6]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [量价背离, VPA, 量价分析]
default_priority: 65
market_regimes: [trending_up, trending_down]

instructions: |
  **量价背离策略（Volume-Price Divergence — VPA Based）**
  
  Core Idea：价格是表象，量能是真相。量价背离（价格与成交量走向不一致）是趋势即将反转的最可靠预警信号之一。
  
  ---
  
  ## Step 1: Volume-Price Relationship Fundamentals
  
  | 量价组合 | 含义 | 趋势含义 |
  |----------|------|----------|
  | 价涨量增 | 健康上涨，趋势有效 | 继续看多 |
  | 价涨量缩 | 上涨乏力，需求不足 | 警惕反转 |
  | 价跌量增 | 恐慌抛售或主力出货 | 看空 |
  | 价跌量缩 | 下跌动能衰减 | 可能见底 |
  | 价平量增 | 多空分歧加大，即将变盘 | 准备突破 |
  | 价平量缩 | 无人关注，蓄势 | 等待方向 |
  
  ---
  
  ## Step 2: 四类核心背离形态
  
  使用 `get_daily_history`（60 日），识别以下背离：
  
  ### Divergence 1：顶背离 — 价创新高、量不跟随
  - **形态**：价格创近 20 日新高，但当日成交量 < 前一次高点时的成交量。
  - **验证**：连续 2-3 个高点均出现量缩 → 强顶背离。
  - **信号**：强卖出信号，上涨动能衰竭。
  - **操作**：减仓至 1/3，若次日放量下跌则清仓。
  
  ### Divergence 2：底背离 — 价创新低、量不跟随
  - **形态**：价格创近 20 日新低，但当日成交量 < 前一次低点时的成交量。
  - **验证**：连续 2-3 个低点均出现量缩 → 强底背离。
  - **信号**：强买入信号，下跌动能衰竭。
  - **操作**：轻仓试探，等待Bounce Confirmation后加仓。
  
  ### Divergence 3：价涨量缩（连续型）
  - **形态**：连续 5 日以上价格上涨，但日均量持续下降（每 3 日量均值递减）。
  - **信号**：上涨不可持续，随时可能回调。
  - **操作**：减仓 1/2，设紧贴止损。
  
  ### Divergence 4：价跌量缩（连续型）
  - **形态**：连续 5 日以上价格下跌，但日均量持续下降。
  - **信号**：抛压衰竭，底部信号。
  - **操作**：关注但不急于抄底，等待首个放量阳线。
  
  ---
  
  ## Step 3: Smart Money Behavior Identification（VPA 高级应用）
  
  ### 主力吸筹信号（低量区）：
  - 下跌后出现连续缩量小K线（振幅 < 2%，量比 < 0.6）→ 无人关注，主力悄悄吸筹。
  - 低位横盘期阳线量 > 阴线量（阳线放量、阴线缩量）→ 吸筹特征。
  - 底部突然出现单日放量阳线（量比 > 2.0）后迅速缩量 → 主力试盘。
  
  ### 主力出货信号（高量区）：
  - 高位放量滞涨（量比 > 2.0 但涨幅 < 1% 或收阴）→ 主力出货。
  - 高位连续放量但价格横盘（主力对倒出货）。
  - 高位上影线 + 巨量（量比 > 3.0）→ 拉高出货。
  
  ### UT / UTAD（Upthrust / Upthrust After Distribution）：
  - 价格短暂突破阻力位后迅速回落，量比 > 2.0 → UT，强烈的看跌信号。
  - 多次 UT 后仍不放量突破 → 主力已出货完毕。
  
  ---
  
  ## Step 4: Divergence Strength Score
  
  | 评分项 | 分数 | 条件 |
  |--------|------|------|
  | 背离确认次数 | +3 | 连续 3 次以上背离 |
  | 背离确认次数 | +2 | 连续 2 次背离 |
  | 背离幅度 | +3 | 量能缩小 > 50% vs 前高/前低 |
  | 背离幅度 | +1 | 量能缩小 20-50% |
  | MACD 配合 | +2 | MACD 同步背离 |
  | 价格幅度 | +2 | 背离段价格幅度 > 10% |
  | 时间跨度 | +1 | 背离横跨 > 15 个交易日 |
  
  **总分 ≥ 8** → 强背离信号；**5-7** → 中等背离；**< 5** → 弱背离。
  
  ---
  
  ## Step 5: 背离后Action Matrix
  
  | 背离类型 | 评分 | 操作 | 仓位 | 止损 |
  |----------|------|------|------|------|
  | 强顶背离 |（≥ 8） | 清仓或减至 1/10 | — | — |
  | 中顶背离 |（5-7） | 减仓至 1/3 | — | -3% |
  | 弱顶背离 |（< 5） | 设紧贴止损 | 维持 | -2% |
  | 强底背离 |（≥ 8） | 试探买入 | 1-2 成 | 背离低点 -2% |
  | 中底背离 |（5-7） | 关注等待 | 0 | — |
  | 弱底背离 |（< 5） | 忽略 | 0 | — |
  
  ---
  
  ## Step 6: 与其他指标共振
  
  - **顶背离 + RSI > 70** → 卖出信号极强。
  - **顶背离 + 放量滞涨** → 主力出货，立即清仓。
  - **底背离 + RSI < 30** → 超卖区背离，买入信号极强。
  - **底背离 + 缩量至地量** → 底部信号，等待放量阳线确认。
  - **底背离 + MACD 金叉** → 三重确认，重仓信号。
  
  ---
  
  ## Step 7: Fake Divergence Filter
  
  - 在单边极端行情中（如连续涨停/跌停），量能不反映真实意愿 → 不适用。
  - 低流动性股票（日均换手 < 0.3%）→ 量能失真。
  - 背离后 5 日内未见价格反转 → 背离可能失效，重新评估。
  
  ---
  
  ## Output Requirements
  
  - 当前量价关系类型（价涨量增 / 价涨量缩 / 价跌量增 / 价跌量缩 / 价平量×）。
  - 检测到的背离类型（顶/底/连续型）及确认次数。
  - Divergence Strength Score明细。
  - 主力行为判断（吸筹/出货/试盘/UT）。
  - 操作建议、仓位、止损。
  
  ---
  
  **Score Adjustments:**
  - 强顶背离（≥ 8 分）+ 主力出货：`sentiment_score -18`
  - 中顶背离（5-7 分）：`sentiment_score -10`
  - 强底背离（≥ 8 分）+ 主力吸筹：`sentiment_score +15`
  - 中底背离（5-7 分）+ 缩量衰竭：`sentiment_score +8`
  - 价涨量缩（连续 5 日）：`sentiment_score -6`
  - 价跌量缩（连续 5 日）：`sentiment_score +5`
  - UT / UTAD 确认：`sentiment_score -12`
  - 在 `volume_analysis` 和 `buy_reason` 中注明"量价背离"及背离评分。
  
