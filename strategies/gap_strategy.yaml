# Gap Analysis Strategy / 缺口策略
# Analyzes price gaps: breakaway, runaway/measuring, and exhaustion gaps.

name: gap_strategy
display_name: 缺口策略
description: 识别突破缺口、中继缺口与衰竭缺口，判断趋势阶段与缺口回补概率。
category: pattern
core_rules: [2, 3, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [缺口, 跳空, 缺口战法]
default_priority: 105
market_regimes: [trending_up, trending_down]

instructions: |
  **缺口策略（Gap Analysis Strategy）**
  
  Core Idea：价格跳空缺口反映市场情绪突变。不同类型的缺口预示不同的趋势阶段和操作机会。
  
  ---
  
  ## Step 1: Gap Identification
  
  使用 `get_daily_history`（30 日），识别当日或近期的缺口：
  
  **向上缺口**：今日最低价 > 昨日最高价。
  **向下缺口**：今日最高价 < 昨日最低价。
  
  记录：
  - 缺口大小 = (今低 - 昨高) / 昨收 × 100%（向上）
  - 缺口大小 = (昨低 - 今高) / 昨收 × 100%（向下）
  - 缺口大小 < 1% → 可忽略（小缺口无意义）。
  - 缺口大小 1-3% → 正常缺口。
  - 缺口大小 > 3% → 大缺口。
  
  ---
  
  ## Step 2: Gap Classification
  
  ### Type A：突破缺口（Breakaway Gap）⭐⭐⭐⭐⭐
  - **位置**：出现在长期盘整或趋势反转初期。
  - **特征**：
    - 前期横盘 ≥ 20 日（振幅 < 15%）。
    - 缺口日成交量暴增（量比 > 2.0）。
    - 缺口方向与突破方向一致。
    - 缺口后价格不回补（或浅回补后继续）。
  - **含义**：趋势启动信号，最可靠的缺口类型。
  - **操作**：顺势追入，止损设在缺口上沿（向上）/ 下沿（向下）。
  
  ### Type B：中继缺口（Runaway / Measuring Gap）⭐⭐⭐⭐
  - **位置**：出现在已有趋势的中段。
  - **特征**：
    - 趋势已运行 10-25 日。
    - 缺口日成交量温和放大（量比 1.2-2.0）。
    - 缺口大小通常 1-2%。
    - 趋势强度未衰减。
  - **含义**：趋势加速信号，趋势可能还有一半路程。
  - **中继缺口测距**：缺口位置 ≈ 趋势起点到终点的 50% 位置。
    → 预估目标 = 缺口价 + (缺口价 - 趋势起点价)。
  
  ### Type C：衰竭缺口（Exhaustion Gap）⭐⭐
  - **位置**：出现在趋势末端。
  - **特征**：
    - 趋势已运行 > 25 日或涨幅 > 30%。
    - 缺口后 1-3 日内价格即回补缺口。
    - 缺口日量比可能很大（> 2.5），但次日即缩量。
    - 出现顶/底背驰信号。
  - **含义**：趋势即将反转的警告。
  - **操作**：反向操作！向上衰竭缺口 → 卖出；向下衰竭缺口 → 准备买入。
  
  ### Type D：普通缺口（Common Gap）⭐
  - **特征**：缺口小（< 1%），无成交量配合，3 日内必回补。
  - **操作**：忽略，不属于交易信号。
  
  ---
  
  ## Step 3: Gap Fill Probability Assessment
  
  | 缺口类型 | 3 日内回补概率 | 10 日内回补概率 | 永不回补概率 |
  |----------|--------------|---------------|------------|
  | 突破缺口 | 15% | 25% | 60% |
  | 中继缺口 | 20% | 35% | 45% |
  | 衰竭缺口 | 60% | 85% | 5% |
  | 普通缺口 | 90% | 99% | 1% |
  
  **向上缺口回补** = 价格跌回缺口上沿以下。
  **向下缺口回补** = 价格涨回缺口下沿以上。
  
  ---
  
  ## Step 4: Multi-Gap Sequence Analysis
  
  若同一方向出现多个缺口：
  
  | 缺口序列 | 含义 | 操作 |
  |----------|------|------|
  | 第 1 个缺口 | 通常是突破缺口 | 顺势入场 |
  | 第 2 个缺口 | 通常是中继缺口 | 加仓/持有 |
  | 第 3 个缺口 | 通常是衰竭缺口！ | 准备反向 |
  | 第 4 个缺口 | 几乎必是衰竭 | 立即反向操作 |
  
  —— **「三跳空、气数尽」原则**。
  
  ---
  
  ## Step 5: Volume-Price Confirmation
  
  | 缺口类型 | 理想量能 | 警告信号 |
  |----------|----------|----------|
  | 向上突破 | 量比 > 2.0 + 收阳 | 量比 > 3.0 但上影长 → 出货嫌疑 |
  | 向上中继 | 量比 1.2-2.0 | 量比 < 1.0 → 无量缺口，不可靠 |
  | 向上衰竭 | 量比 > 2.5 但次日缩量 | 顶背驰确认 → 清仓 |
  | 向下突破 | 量比 > 2.0 + 收阴 | 恐慌抛售确认 |
  | 向下衰竭 | 量比 > 2.5 但下影长 | 底背驰 → 准备抄底 |
  
  ---
  
  ## Step 6: Action Matrix
  
  | 缺口类型 | 方向 | 操作 | 仓位 | 止损 |
  |----------|------|------|------|------|
  | 突破（向上） | 做多 | 追入 | 3-5 成 | 缺口上沿 -2% |
  | 中继（向上） | 做多 | 加仓 | 2-3 成 | 缺口上沿 -1.5% |
  | 衰竭（向上） | 做空/减仓 | 卖出 | 清仓 | — |
  | 突破（向下） | 做空/离场 | 清仓 | — | — |
  | 中继（向下） | 观望 | 不抄底 | 0 | — |
  | 衰竭（向下） | 准备做多 | 关注 | 0 | 等确认信号 |
  
  ---
  
  ## Output Requirements
  
  - 缺口类型（突破/中继/衰竭/普通）。
  - 缺口大小和方向。
  - 同方向缺口序列编号（第几个缺口）。
  - Gap Fill Probability Assessment。
  - 量能配合情况。
  - 若中继缺口 → 给出测距目标。
  - 操作建议及止损。
  
  ---
  
  **Score Adjustments:**
  - 向上突破缺口 + 横盘突破 + 放量：`sentiment_score +15`
  - 向上中继缺口 + 趋势中段：`sentiment_score +10`
  - 向上衰竭缺口（第 3+ 个缺口）：`sentiment_score -12`（反转卖出）
  - 向下突破缺口：`sentiment_score -15`（离场）
  - 向下衰竭缺口 + 底背驰：`sentiment_score +8`（关注反转）
  - 缺口 < 1%（普通缺口）：不调整
  - 在 `pattern_analysis` 中注明缺口类型及序列编号。
  
