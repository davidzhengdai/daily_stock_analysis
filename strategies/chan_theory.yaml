# Chan Theory Strategy / 缠论
# Based on Zen channel theory: pen, stroke, segment, hub structure analysis.
# Optimized v2: Practical implementation focused on divergence + pivot levels.
# Simplified for LLM execution — focus on divergence detection and key levels.

name: chan_theory
display_name: 缠论
description: 基于缠论核心思想，聚焦背驰识别、关键分型与中枢定位，适配 LLM 实际执行能力。
category: framework
core_rules: [1, 2, 3, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [缠论, 缠论分析]
default_priority: 70
market_regimes: [volatile]

instructions: |
  **缠论 v2（Chan Theory — Practical Edition）**
  
  版本说明：原版缠论（笔→线段→中枢→趋势）需要精确的分型识别，LLM 无法从非结构化数据中可靠执行。v2 聚焦于 **LLM 可实际执行** 的三个核心：背驰识别、关键高低点定位、中枢箱体操作。
  
  ---
  
  ## 1. 关键高低点识别（简化分型）
  
  使用 `get_daily_history`（60 日），识别顶分型和底分型：
  
  **顶分型**：中间K线高点 > 左右两根K线的高点 → 标记为局部顶。
  **底分型**：中间K线低点 < 左右两根K线的低点 → 标记为局部底。
  
  - 连续两个顶分型之间的最低底分型 → 一段"向下笔"。
  - 连续两个底分型之间的最高顶分型 → 一段"向上笔"。
  - 画出近 60 日所有有效笔（实体 > 3% 的笔更可靠）。
  
  ---
  
  ## 2. 中枢识别（简化）
  
  中枢 = 连续至少 3 笔重叠的价格区间。
  
  - 取最近 3-5 笔的重叠区间：
    - 中枢高 = min(各笔高点)
    - 中枢低 = max(各笔低点)
  - 若中枢高 > 中枢低 → 有效中枢。
  - 价格在中枢内 = 中枢震荡；价格在中枢上方 = 中枢上移（上涨趋势）；价格在中枢下方 = 中枢下移（下跌趋势）。
  
  ---
  
  ## 3. Divergence Assessment（核心信号，LLM 可执行）
  
  使用 `analyze_trend` 获取 MACD 数据，对比价格高低点：
  
  | 类型 | 价格 | MACD | 信号 |
  |------|------|------|------|
  | 顶背驰 | 价格创新高 | DIF 不创新高 / 红柱面积缩小 | 强卖 |
  | 底背驰 | 价格创新低 | DIF 不创新低 / 绿柱面积缩小 | 强买 |
  | 盘整背驰 | 价格在中枢内震荡 | MACD 柱逐波缩短 | 盘整接近尾声 |
  
  **背驰确认三要素**（缺一不可）：
  1. 价格新高/新低
  2. MACD 柱面积或 DIF 不跟随
  3. 在关键高低点（顶/底分型）附近发生
  
  ---
  
  ## 4. Buy/Sell Point Practical Identification
  
  | 买卖点 | 条件 | 可靠性 |
  |--------|------|--------|
  | **一买** | 下跌趋势 + 最后一个中枢下方 + 底背驰 | 5星 |
  | **二买** | 一买后上涨 + 回调不破一买低点 | 4星 |
  | **三买** | 中枢上方 + 回调不回到中枢内 | 3星 |
  | **一卖** | 上涨趋势 + 最后一个中枢上方 + 顶背驰 | 5星 |
  | **二卖** | 一卖后下跌 + 反弹不破一卖高点 | 4星 |
  | **三卖** | 中枢下方 + 反弹不回到中枢内 | 3星 |
  
  **Position & Level Mapping**：
  - 日线级别一买/一卖 → 3-5 成仓
  - 30分钟级别（需 `get_daily_history` 估算）→ 1-2 成仓
  - 多级别共振（日线买点 + 周线趋势向上）→ 5-7 成仓
  
  ---
  
  ## 5. Post-Divergence Pattern Classification
  
  背驰出现后，有三种可能走势：
  1. **直接反转**（概率 ~30%）：背驰后价格快速反向。
  2. **中枢扩展**（概率 ~50%）：背驰后进入更大级别中枢震荡。
  3. **背驰失败**（概率 ~20%）：背驰后继续原方向（小转大）。
  
  → 一买/一卖后若 3 日内价格回到中枢内，走势力道减弱，降仓。
  
  ---
  
  ## 6. 输出要求
  
  - 列出近 60 日关键顶/底分型及价位。
  - 识别当前中枢区间（中枢高/中枢低）。
  - 明确判断有无背驰及背驰级别。
  - 给出当前买卖点类型，若无则写「暂无明确买卖点」。
  - 预判背驰后三种走势的概率分布。
  - 止损设于前低（买入）/ 前高（卖出）。
  
  ---
  
  **Score Adjustments:**
  - 底背驰 + 日线一买确认：`sentiment_score +18`
  - 二买 + 中枢上方企稳：`sentiment_score +12`
  - 三买确认：`sentiment_score +8`
  - 中枢震荡无方向：`sentiment_score` 不变
  - 顶背驰 / 一卖：`sentiment_score -15`
  - 三卖确认：`sentiment_score -10`
  
