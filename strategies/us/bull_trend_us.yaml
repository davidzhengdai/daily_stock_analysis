instructions: |
  **Bull Trend Strategy**
  
  Trend-following framework for US equities. Classify the trend phase, verify sector participation,
  measure relative strength against benchmark, and size positions accordingly.
  
  ---
  
  ## Step 1: Trend Phase Classification
  
  Use get_daily_history (90 days, daily) and analyze_trend. Classify into four phases:
  
  | Phase    | Characteristics                                                        | Priority    |
  |----------|------------------------------------------------------------------------|-------------|
  | Early    | MA5 crossed above MA20 within last 10 days, MACD just turned positive, volume expanding moderately | Highest     |
  | Mid      | MAs fanning upward with separation, slope > 20 degrees, MACD in strong territory | Buy pullbacks |
  | Late     | Price > 8% above MA5, MACD histogram contracting (bearish divergence risk), volume stalling | Sell only   |
  | Topping  | MA5 flattening, MAs converging, volume drying up, lower highs forming  | Wait         |
  
  Trend health = percentage of last 20 closes above MA20. Below 60%: trend fatigue, reduce position by half.
  
  ---
  
  ## Step 2: Relative Strength vs Benchmark
  
  Use get_daily_history (60 days). Compute RS Rating:
    RS = (stock 60-day return) / (SPY 60-day return)
  
  - RS > 1.20: Market leader. May relax deviation tolerance to 6%.
  - RS 0.80-1.20: Market performer. Standard rules apply.
  - RS < 0.80: Laggard. Avoid regardless of absolute trend — underperforming in an up market is a red flag.
  
  Also compare against the stock's sector ETF (e.g., XLK for tech, XLF for financials) for sector-relative strength.
  
  ---
  
  ## Step 3: Sector Participation Check
  
  Use get_sector_rankings:
  - Is the stock's GICS sector in the top 30% of 5-day returns? (tailwind)
  - Is the stock ranked in the top 20% within its sector? (leadership)
  - Tailwind + Leadership = strongest combination. Normal position size.
  - Tailwind + Laggard = reduce position by half.
  - Headwind + anything = avoid; solo outperformers in weak sectors rarely sustain.
  
  ---
  
  ## Step 4: Entry Timing Matrix
  
  | Deviation (MA5) | Phase      | Volume Condition       | Action           |
  |-----------------|------------|------------------------|------------------|
  | < 2%            | Early/Mid  | Contracting, support   | Heavy buy        |
  | < 2%            | Early/Mid  | Expanding on bounce    | Standard buy     |
  | 2-5%            | Early/Mid  | --                     | Light probe      |
  | 2-5%            | Late       | --                     | Do not buy       |
  | > 5%            | Any        | --                     | No chase         |
  | Pullback to MA20| Mid        | Contracting, holds     | Golden entry     |
  | Break below MA20| Any        | Expanding              | Reduce / exit    |
  | Pullback to 50-day MA | Early/Mid | Contracting, holds | Institutional buy zone |
  
  ---
  
  ## Step 5: Adaptive Position Sizing
  
  | Composite Score | Position | Stop-Loss           | Notes                      |
  |-----------------|----------|---------------------|----------------------------|
  | >= 8/10         | 50-70%   | MA20 or -5%         | High conviction            |
  | 5-7/10          | 30-50%   | MA20 or -4%         | Standard                   |
  | 3-4/10          | 10-20%   | MA10 or -3%         | Probe only                 |
  | < 3/10          | 0%       | --                  | Stand aside                |
  
  Composite = Phase (0-2.5) + RS (0-2.5) + Sector (0-2.5) + Entry Timing (0-2.5).
  
  ---
  
  ## Step 6: Risk Screening

  Use search_stock_news, last 7 days:
  - Insider cluster selling (multiple officers) -> VETO
  - Earnings miss or guidance revision lower -> VETO
  - SEC investigation / DOJ action / class action -> VETO
  - Lockup expiration > 5% of float -> VETO
  - Sector-wide regulatory or rate headwind -> reduce position one tier
  - Check short interest: > 20% of float may indicate structural problem or squeeze setup (context-dependent)

  ---

  ## Step 7: Fundamental & Macro Analysis (required — equal weight to technicals)

  Technical signals are necessary but not sufficient. Before finalizing any recommendation,
  explicitly evaluate the following four non-technical dimensions. Each dimension can
  independently override or reinforce the technical conclusion.

  ### 7a. Fundamentals
  - Latest earnings: beat / in-line / miss vs consensus EPS and revenue estimates
  - Guidance trend: raised / maintained / lowered — guidance changes carry more weight than single quarter beats
  - Revenue growth rate YoY, gross margin trend, free cash flow direction
  - Balance sheet: debt load, interest coverage — especially important for financials and rate-sensitive sectors
  - Valuation: P/E and P/B vs sector average and 5-year historical range; flag if significantly stretched
  - **Score adjustment**: Beat + raised guidance -> +10; Miss + lowered guidance -> -15

  ### 7b. Macro & Political Environment
  - Federal Reserve policy: rate direction (hiking / pausing / cutting) and its sector-specific impact
    (e.g., rising rates = headwind for high-P/E growth stocks, potential tailwind for banks' NIM)
  - Regulatory landscape: any pending rules, Congressional hearings, executive orders, or agency actions
    affecting the company's sector
  - Trade policy: tariffs, export controls, sanctions — note direct exposure
  - Geopolitical events with material sector impact (energy supply shocks, currency moves, sovereign risk)
  - **Score adjustment**: Clear macro tailwind -> +8; Active regulatory headwind / trade risk -> -10

  ### 7c. News Catalysts & Events
  - Product launches, major contract wins, M&A announcements, key management changes
  - Analyst upgrades/downgrades with rationale (not just the rating change)
  - ESG / reputational events that may affect institutional ownership
  - Assess whether the news flow is net positive, mixed, or net negative over the search window
  - **Score adjustment**: Major positive catalyst -> +8; Significant negative event -> -10

  ### 7d. Social Sentiment & Retail Interest
  - Reddit / StockTwits / X (Twitter) trending: rising or falling mention volume
  - Unusual options activity flagged in social channels (gamma squeeze risk or institutional hedging signal)
  - Retail sentiment divergence from institutional: a crowded retail long in a technically weak setup is a warning
  - **Score adjustment**: Strong positive social momentum + institutional alignment -> +5;
    Retail-driven hype without fundamental support -> 0 (do not add); Heavy retail short squeeze attempt -> flag as high-risk

  ### Multi-Factor Verdict
  After evaluating all four dimensions, state explicitly:
  - Which dimensions align with a bullish view, which are neutral, which are bearish
  - Whether news_confluence.verdict is "Supports buy", "Neutral", "Weakens", or "Contradicts"
  - The composite non-technical score adjustment (sum of 7a–7d adjustments, cap at ±25)
  - Final recommendation must reconcile technicals with this multi-factor view:
    - If technicals say buy but macro+fundamentals say headwind → downgrade one tier, note "技术偏多但宏观承压"
    - If technicals are mixed but fundamentals+news strongly positive → upgrade one tier, note "基本面驱动"
    - Never produce a high-conviction buy solely from MA alignment; require at least one non-technical dimension to confirm

  ---

  ## Output Requirements

  Must output:
  - Trend phase and health percentage
  - RS Rating vs SPY and sector ETF
  - Sector participation conclusion (tailwind/neutral/headwind)
  - Deviation from MA5 and entry timing score
  - Fundamental verdict (earnings beat/miss, guidance, valuation)
  - Macro/political verdict (rate environment, regulatory risk)
  - News catalyst verdict (net positive/mixed/negative)
  - Social sentiment verdict
  - Composite non-technical score adjustment
  - Final composite score and suggested position size
  - Stop-loss level (exact price)
  - If conditions not met: state "No trade — conditions insufficient"

  ---

  **Score Adjustments:**
  - Early phase + sector tailwind + deviation < 2%: sentiment_score +15
  - Mid phase + pullback to 50-day MA holding: sentiment_score +12
  - Mid phase + deviation 2-5%: sentiment_score +8
  - Late phase / deviation > 8%: sentiment_score -10
  - Break below MA20 with expanding volume: sentiment_score -12
  - Sector headwind: sentiment_score -5
  - Earnings beat + raised guidance: sentiment_score +10
  - Earnings miss + lowered guidance: sentiment_score -15
  - Clear macro tailwind (e.g., rate cut for rate-sensitive sector): sentiment_score +8
  - Active regulatory headwind or trade risk: sentiment_score -10
  - Major positive news catalyst: sentiment_score +8
  - Significant negative news event: sentiment_score -10
  - Strong positive social momentum aligned with institutions: sentiment_score +5
  
