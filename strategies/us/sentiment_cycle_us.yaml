instructions: '**Sentiment Cycle Strategy**


  Contrarian positioning using stock-specific adaptive thresholds plus macro sentiment

  indicators: AAII survey, put/call ratio, VIX. Be greedy when others are fearful.


  ---


  ## Step 1: Stock-Specific Turnover Baseline


  Using get_daily_history (120 days), compute the stock''s OWN turnover percentile distribution.

  Never use fixed thresholds: a mega-cap''s "high turnover" is a small-cap''s "low turnover."


  | Percentile     | Label         | Sentiment Signal |

  |----------------|---------------|------------------|

  | < 10th         | Apathetic     | Extreme fear (contrarian buy) |

  | 10th-30th      | Disinterested | Fear             |

  | 30th-70th      | Normal        | Neutral          |

  | 70th-90th      | Interested    | Greed            |

  | > 90th         | Frothy        | Extreme greed (contrarian sell) |


  ---


  ## Step 2: Six-Dimension Sentiment Scorecard (18 points)


  ### D1: Turnover Percentile (0-3 pts)

  - < 10th: +3 | 10-30th: +2 | 30-70th: +1 | 70-90th: -1 | > 90th: -3


  ### D2: Turnover Trend — 5-day / 20-day avg (0-3 pts)

  - < 0.5 (plunging): +3 | 0.5-0.8: +2 | 0.8-1.2: +1 | 1.2-2.0: -1 | > 2.0: -3


  ### D3: Volume Regime — 10-day / 60-day avg (0-3 pts)

  - < 0.5 (extreme contraction): +3 | 0.5-0.7: +2 | 0.7-1.3: +1 | 1.3-2.0: -1 | > 2.0: -3


  ### D4: Price Deviation from 50 DMA (0-3 pts)

  - < -15% (washed out): +3 | -5 to -15%: +2 | -5 to +5%: +1 | +5 to +15%: -1 | > +15%: -3


  ### D5: News Sentiment (0-3 pts)

  Using search_stock_news:

  - Overwhelmingly negative / "death of the company" narratives: +3 (extreme contrarian)

  - Mostly negative: +2 | Neutral / no coverage: +1

  - Mostly positive: -1 | Euphoric / price target raises across the street: -3


  ### D6: Technical Confirmation (0-3 pts)

  - Bullish divergence (MACD or RSI): +3 | RSI < 30: +2 | RSI 30-45: +1

  - RSI 45-55: 0 | RSI 55-70: -1 | RSI > 70 or bearish divergence: -3


  ---


  ## Step 3: Macro Sentiment Overlay (Bonus)


  - AAII Bull-Bear Spread: Bears > 45% -> +1; Bulls > 45% -> -1

  - Put/Call Ratio: > 1.2 (extreme fear) -> +1; < 0.6 (complacency) -> -1

  - VIX: > 30 (fear) -> +1; < 13 (extreme complacency) -> -2

  - NYSE 52-week lows > 100: +1 (breadth washout)


  ---


  ## Step 4: Composite and Phase


  | Score      | Phase               | Action                                       |

  |------------|---------------------|----------------------------------------------|

  | +12 to +18 | Capitulation / Fear | Aggressive buy (maximum contrarian)          |

  | +6 to +11  | Pessimism           | Scale in                                     |

  | 0 to +5    | Doubt / Neutral     | Hold or light probe                          |

  | -5 to -1   | Optimism            | Hold, do not add                             |

  | -11 to -6  | Greed               | Reduce                                       |

  | -18 to -12 | Euphoria            | Exit (maximum contrarian sell)               |


  ---


  ## Step 5: Position Matrix


  | Phase              | Position | Stop         | Add Condition                    |

  |--------------------|----------|--------------|----------------------------------|

  | Capitulation/Fear  | 60-80%   | -5% or low   | 5-day stabilization, add to 90%  |

  | Pessimism          | 30-50%   | -5%          | Sentiment score improving        |

  | Doubt/Neutral      | 10-30%   | -3%          | Wait for direction               |

  | Optimism           | 10-20%   | -3%          | Do not add                       |

  | Greed              | 0-10%    | -2%          | Do not add                       |

  | Euphoria           | 0%       | --           | Exit                             |


  ---


  ## Step 6: Pivot Signals


  Bottom pivot (fear to doubt):

  - High-volume selling climax followed by higher low on lower volume

  - Insider buying cluster (multiple officers buying open market)

  - First positive catalyst after negative flow exhausted


  Top pivot (greed to fear):

  - Euphoric rally on declining momentum (higher high, lower MACD)

  - "This time is different" narratives widespread

  - Insider selling cluster


  ---


  ## Output Requirements


  - Stock turnover baseline percentiles

  - Six-dimension score breakdown

  - Macro sentiment overlay scores

  - Composite score and phase

  - Position recommendation

  - Pivot signal alert


  ---


  **Score Adjustments:**

  - Capitulation phase (> 12) + macro fear signals: sentiment_score +20

  - Pessimism (6-11): sentiment_score +14

  - Doubt/Neutral: sentiment_score +5

  - Euphoria (< -12) + macro complacency: sentiment_score -20

  - Greed (-6 to -11): sentiment_score -12

  - Bottom pivot signal: bonus +5

  - Top pivot signal: bonus -5

  '
