instructions: '**Dip Buy Strategy**


  Buy pullbacks to key moving averages in an established uptrend.

  Integrates Fibonacci retracements, VIX context, and institutional buy zones.


  ---


  ## Step 1: Trend Prerequisites (Must All Pass)


  Using analyze_trend:

  - 20 EMA > 50 EMA > 200 DMA (bullish alignment) OR 10 EMA > 20 EMA (for faster setups)

  - 50 DMA slope > 0 (rising)

  - At least 7 of last 10 closes above 20 EMA (trend intact)

  - No lower high / lower low sequence forming

  - If 50 DMA is flat or declining: strategy does not apply


  ---


  ## Step 2: Support Hierarchy (Institutional Buy Zones)


  | Level | Support                  | Reliability | Typical Buyer        | Position |

  |-------|--------------------------|-------------|----------------------|----------|

  | L1    | 10 EMA                   | Medium      | Active traders       | 30-50%   |

  | L2    | 20 EMA                   | High        | Swing traders        | 40-60%   |

  | L3    | 50 DMA                   | Very High   | Institutions         | 50-70%   |

  | L4    | 200 DMA                  | Highest     | Long-only funds      | 60-80%   |

  | L5    | Fibonacci 38.2% retrace  | High        | Technical traders    | 30-50%   |

  | L6    | Fibonacci 61.8% retrace  | Highest     | Deep value / golden  | 50-70%   |


  The 50 DMA and 200 DMA are the most watched levels by institutional investors.

  A pullback to the 50 DMA in a strong uptrend is widely considered a gift.


  ---


  ## Step 3: Pullback Quality Scorecard (16 points)


  ### A. Volume Contraction (0-3 pts)

  - Pullback day relative volume < 0.5 (extreme contraction, no distribution): +3

  - 0.5-0.7: +2

  - 0.7-1.0: +1

  - > 1.0 (not contracting, possible distribution): +0


  ### B. Price Precision (0-3 pts)

  - Price touches support within +/- 1%: +3

  - Within +/- 2%: +2

  - Within +/- 3%: +1

  - Overshoots: +0


  ### C. Candle Quality (0-2 pts)

  - Hammer / doji / bullish engulfing at support: +2

  - Small red candle with contracting volume: +1

  - Large red candle (> 3% body) with expanding volume: -1 (capitulation)


  ### D. Bounce Confirmation (0-3 pts)

  - Next session closes green with body > 50% of range: +3

  - Next session probes lower then recovers (lower wick > body): +2

  - Next session closes red below support: -2 (failure, no entry)


  ### E. Trend Position (0-2 pts)

  - Pullback within first 15% of trend move: +2 (early, safest)

  - Mid-trend (15-30% from start): +1

  - Late trend (> 30% from start): +0 (may be topping, not dipping)


  ### F. VIX / Macro Context (0-3 pts)

  - VIX declining or low (< 18): +3 (benign environment)

  - VIX stable 18-25: +2

  - VIX rising or > 25: +1 (fear may deepen pullback)

  - VIX spiking > 30: -1 (systemic event, scale out, do not buy dips)


  ---


  ## Step 4: Pullback Grade and Position


  | Score   | Grade     | Position | Action                        |

  |---------|-----------|----------|-------------------------------|

  | >= 12   | Textbook  | 50-70%   | Aggressive buy at support     |

  | 9-11    | High Quality | 30-50%| Standard buy                  |

  | 6-8     | Acceptable| 20-30%   | Light buy, wait for bounce    |

  | 3-5     | Weak      | 10%      | Probe only if conditions improve |

  | < 3     | Invalid   | 0%       | Pass                          |


  ---


  ## Step 5: Dynamic Stop Management


  - Initial stop: Support level -3% (or -2% for volatile names)

  - Breakeven stop: After price makes new swing high, move stop to entry

  - Trailing stop: After +7%, trail at -4% from highest close

  - Trend stop: 20 EMA crosses below 50 DMA -> exit regardless

  - Time stop: No bounce within 5 sessions -> exit (capital tied up)


  ---


  ## Step 6: Risk Veto


  Using search_stock_news (7 days):

  - Earnings warning / guidance cut -> VETO

  - CFO/CEO departure (unexpected) -> VETO

  - SEC filing delay / accounting issue -> VETO

  - Large secondary offering -> VETO

  - Sector-wide downgrade -> reduce position by one tier


  ---


  ## Output Requirements


  - Effective support levels and current distance from each

  - Fibonacci retracement levels (38.2%, 50%, 61.8%)

  - VIX context and macro overlay

  - Quality score breakdown and total

  - Grade and position size

  - All stop levels (initial, breakeven, trailing, trend, time)


  ---


  **Score Adjustments:**

  - Textbook (> 12) + institutional support (50/200 DMA): sentiment_score +16

  - High Quality (9-11): sentiment_score +12

  - Acceptable (6-8): sentiment_score +8

  - 61.8% Fibonacci golden retrace + contraction + hammer: bonus +5

  - VIX spiking environment: sentiment_score -5

  '
