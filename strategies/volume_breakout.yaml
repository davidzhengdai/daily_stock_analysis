# Volume Breakout Strategy / 放量突破
# Price breaks above resistance on heavy volume (>2x average).
# Optimized v2: Breakout quality scoring, multi-level resistance,
# retesting logic, pre-breakout accumulation analysis, and dynamic targets.

name: volume_breakout
display_name: 放量突破
description: 检测放量突破阻力位，含突破质量十维评分、多级阻力体系、回踩确认逻辑与累积分析。
category: trend
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - search_stock_news
aliases: [放量突破, 突破]
default_priority: 30
market_regimes: [trending_up]

instructions: |
  **放量突破 v2（Volume Breakout — Expert Enhanced）**
  
  核心升级：十维突破质量评分 + 多级阻力 + 突破前吸筹分析 + 回踩确认 + 动态目标。
  
  ---
  
  ## Step 1: 多级阻力识别
  
  使用 `get_daily_history`（90 日）和 `analyze_trend`，建立阻力层级：
  
  | 级别 | 阻力来源 | 强度 |
  |------|----------|------|
  | R1 | 近 20 日高点 | 弱 |
  | R2 | 近 60 日高点 / 前期平台顶 | 中 |
  | R3 | 近 120 日高点 / 历史套牢区 | 强 |
  | R4 | 整数关口（如 10/20/50/100 元） | 心理 |
  | R5 | 斐波那契 61.8%/100% 延伸 | 强 |
  
  - 当前价格面对哪一级阻力？
  - 突破 R1/R2 → 正常信号；突破 R3 → 重大信号但难度大；突破 R4 → 快速穿越。
  
  ---
  
  ## Step 2: 突破前吸筹分析（新增关键步骤！）
  
  使用 `get_daily_history`（30 日），分析突破前的价格行为：
  
  ### 吸筹迹象（越多越好）：
  - 突破前 10-20 日出现缩量横盘（量比 < 0.7 持续 5 日以上）。
  - 横盘期间阳线数量 > 阴线数量。
  - 横盘区间振幅 < 10%（筹码锁定良好）。
  - 多次下探支撑位后快速收回（下影线频繁）。
  - 突破前连续放量下跌 → 出货而非吸筹，放弃。
  
  ### Accumulation Quality Score（+0 ~ +3）：
  - 满足 4 项以上 → +3（强吸筹，突破可靠）。
  - 满足 2-3 项 → +2。
  - 满足 1 项 → +1。
  - 无一满足 → +0。
  
  ---
  
  ## Step 3: Breakout Quality 10-Dimension Scorecard（总分 20 分）
  
  | 维度 | 满分 | 标准 |
  |------|------|------|
  | 收盘强度 | 3 | 收盘 = 当日最高价 ± 0.5%（3分）/ 收于上 1/3（2分）/ 收于中段（1分） |
  | 量能倍率 | 3 | 量比 > 3.0（3分）/ 2.0-3.0（2分）/ 1.5-2.0（1分） |
  | 实体占比 | 2 | 阳线实体 > 振幅 70%（2分）/ 50-70%（1分） |
  | 突破幅度 | 2 | 收盘高于阻力 > 2%（2分）/ 1-2%（1分） |
  | 吸筹质量 | 3 | 强吸筹（3分）/ 中（2分）/ 弱（1分） |
  | 板块共振 | 2 | 板块同步突破（2分）/ 板块中性（1分） |
  | 乖离安全 | 2 | 乖离(MA5) < 3%（2分）/ 3-5%（1分）/ > 5%（0分） |
  | 阻力级别 | 2 | 突破 R3 级别（2分）/ R2（1分）/ R1（0.5分） |
  | 连阳天数 | 1 | 突破为连阳第 1-2 日（1分）/ > 3 日（0分，追高） |
  | 无利空 | 1 | search_stock_news 无利空（1分） |
  
  ---
  
  ## Step 4: 突破等级与仓位
  
  | 总分 | 等级 | 操作 |
  |------|------|------|
  | ≥ 16 | 完美突破 | 5-7 成 |
  | 13-15 | 强势突破 | 3-5 成 |
  | 10-12 | 标准突破 | 2-3 成 |
  | 7-9 | 弱势突破 | 1 成试探 |
  | < 7 | 疑似假突破 | 等待回踩确认 |
  
  ---
  
  ## Step 5: 回踩确认入场（实战关键！）
  
  突破后 80% 的情况会回踩原阻力（现支撑），这是最佳Entry Timing：
  - **回踩买入条件**：回踩至原阻力位 ± 1% + 缩量（量比 < 0.8）+ 收阳。
  - **不回踩追入**：仅当总分 ≥ 16 时可追，且仓位不超过 2 成。
  - **回踩跌破**：若回踩跌破原阻力位 → 假突破确认，离场。
  
  ---
  
  ## Step 6: 动态目标与止损
  
  | 突破类型 | 第一目标 | 第二目标 | 止损 |
  |----------|----------|----------|------|
  | R1 突破 | R2 | R3 | R1 -2% |
  | R2 突破 | R3 | 新高 | R2 -2% |
  | R3 突破 | 前高 + 10% | 箱体翻倍 | R3 -3% |
  
  **移动止损**：盈利 > 5% 后，止损上移至成本价。盈利 > 10% 后，止损上移至 +5%。
  
  ---
  
  ## Step 7: Fake Breakout Triple Signal
  
  - 突破日量比 > 3.0 但收长上影线（上影 > 实体 50%） → 主力拉高出货。
  - 突破日次日低开低走收于阻力位以下 → 假突破。
  - 突破前 3 日已有较大涨幅（> 8%）→ 利好提前兑现，突破无效。
  
  ---
  
  ## Output Requirements
  
  - 当前面对的阻力级别（R1-R5）及具体价位。
  - Accumulation Quality Score。
  - 十维突破评分明细及总分。
  - 突破等级及建议仓位。
  - 是否等待回踩确认。
  - 第一/第二目标价及止损位。
  
  ---
  
  **Score Adjustments:**
  - 完美突破（≥ 16 分 + 强吸筹）：`sentiment_score +18`
  - 强势突破（13-15 分）：`sentiment_score +14`
  - 标准突破（10-12 分）：`sentiment_score +10`
  - 弱势突破 + 回踩确认：`sentiment_score +6`
  - 假突破信号 / 长上影：`sentiment_score -8`
  - 突破伴随板块共振：额外 `+5`
  - 在 `buy_reason` 和 `volume_analysis` 中注明"放量突破 v2"及突破评分。
  
