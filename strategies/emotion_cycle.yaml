# Sentiment Cycle Strategy / 情绪周期
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.
# Optimized v2: Adaptive thresholds (per stock), multi-dimension sentiment score,
# position sizing by phase, and contrarian entry timing.

name: emotion_cycle
display_name: 情绪周期
description: 基于市场情绪、换手率与量价结构，含自适应阈值与多维情绪评分，识别恐慌底与狂热顶，逆情绪布局。
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [情绪, 情绪周期]
default_priority: 95
market_regimes: [sector_hot]

instructions: |
  **情绪周期策略 v2（Sentiment Cycle Strategy — Expert Enhanced）**
  
  核心升级：自适应阈值（每只股票独立基准）+ 六维情绪评分 + Phased Position Matrix。
  
  ---
  
  ## Step 1: 建立该股的换手率基准（自适应阈值）
  
  使用 `get_daily_history`（120 日），计算该股自身的换手率分布：
  
  | 百分位 | 含义 | 标签 |
  |--------|------|------|
  | < 10% 分位 | 极低换手（历史冷清） | 冰点 |
  | 10%-30% | 偏低换手 | 冷淡 |
  | 30%-70% | 正常交投 | 正常 |
  | 70%-90% | 偏高换手 | 活跃 |
  | > 90% 分位 | 极高换手（历史高位） | 过热 |
  
  **关键规则**：不使用固定阈值（如 0.5%、5%），而使用该股自身的百分位。大盘蓝筹和小盘题材的"高换手"定义完全不同。
  
  ---
  
  ## Step 2: 6-Dimension Sentiment Scorecard（总分 18 分）
  
  ### Dimension 1：换手率位置（0-3 分）
  - 当前处于 < 10% 分位 → +3（极度冷清，底部特征）
  - 当前处于 10-30% 分位 → +2
  - 当前处于 30-70% 分位 → +1
  - 当前处于 70-90% 分位 → -1
  - 当前处于 > 90% 分位 → -3（极度狂热，顶部风险）
  
  ### Dimension 2：换手率趋势（0-3 分）
  - 近 5 日均换手 / 近 20 日均换手：
    - < 0.5（急速降温）→ +3
    - 0.5-0.8（降温）→ +2
    - 0.8-1.2（平稳）→ +1
    - 1.2-2.0（升温）→ -1
    - > 2.0（急速升温）→ -3
  
  ### Dimension 3：成交量特征（0-3 分）
  - 近 10 日均量 / 近 60 日均量：
    - < 0.5（极度缩量）→ +3
    - 0.5-0.7（缩量）→ +2
    - 0.7-1.3（正常）→ +1
    - 1.3-2.0（放量）→ -1
    - > 2.0（巨量）→ -3
  
  ### Dimension 4：Price Position（0-3 分）
  - 乖离率(MA20)：
    - < -10%（超跌）→ +3
    - -5% ~ -10% → +2
    - -5% ~ +5% → +1
    - +5% ~ +10% → -1
    - > +10% → -3
  
  ### Dimension 5：新闻情绪（0-3 分）
  使用 `search_stock_news`：
  - 新闻以利空/负面为主 → +3（反向指标）
  - 新闻中性/无关注 → +2
  - 新闻温和利好 → +1
  - 新闻重大利好/利好兑现 → -2
  - 新闻狂热追捧/机构大幅上调目标 → -3
  
  ### Dimension 6：技术确认（0-3 分）
  使用 `analyze_trend`：
  - 底背驰确认 → +3
  - RSI < 30 → +2
  - RSI 30-50 → +1
  - RSI 50-70 → -1
  - RSI > 70 / 顶背驰 → -3
  
  ---
  
  ## Step 3: Sentiment Phase Determination
  
  | 总分范围 | 情绪阶段 | 核心操作 |
  |----------|----------|----------|
  | +12 ~ +18 | 绝望底部 | 重仓买入（别人恐惧我贪婪） |
  | +6 ~ +11 | 悲观区域 | 逐步建仓 |
  | 0 ~ +5 | 怀疑/平稳 | 保持或小幅试探 |
  | -5 ~ -1 | 乐观/兴奋 | 持有不加仓 |
  | -11 ~ -6 | 贪婪区域 | 减仓 |
  | -18 ~ -12 | 狂热顶部 | 清仓（别人贪婪我恐惧） |
  
  ---
  
  ## Step 4: 逆情绪仓位矩阵
  
  | 情绪阶段 | 仓位 | 止损 | 加仓条件 |
  |----------|------|------|----------|
  | 绝望底部 | 5-7 成 | -5% 或前低 | 3 日企稳后加至 8 成 |
  | 悲观区域 | 3-5 成 | -5% | 情绪转暖信号出现 |
  | 怀疑/平稳 | 1-3 成维持 | -3% | 等待明确方向 |
  | 乐观/兴奋 | 减至 1-2 成 | -3% | 不加仓 |
  | 贪婪区域 | 减至试探仓 | -2% | 不加仓 |
  | 狂热顶部 | 清仓 | — | — |
  
  ---
  
  ## Step 5: Sentiment Pivot Signals（关键！）
  
  ### 底部转折（由冷转暖）：
  - 恐慌性下跌后出现单日放量阳线（量比 > 2.0）。
  - 连续 3 日换手率从 < 10% 分位回升。
  - 利空出尽后首次出现利好新闻。
  
  ### 顶部转折（由暖转冷）：
  - 狂热上涨后出现单日放量阴线（量比 > 2.0 但收跌）。
  - 换手率从 > 90% 分位连续下降（主力出货后量缩）。
  - 利好兑现后次日高开低走。
  
  ---
  
  ## Output Requirements
  
  - 该股换手率基准（10%/30%/70%/90% 分位值）。
  - 六维评分明细（每维得分）。
  - 当前情绪阶段及总分。
  - 建议仓位及止损。
  - 情绪转折预警（是否有转折信号）。
  
  ---
  
  **Score Adjustments:**
  - 绝望底部（总分 ≥ 12）：`sentiment_score +20`
  - 悲观区域（总分 6-11）：`sentiment_score +14`
  - 平稳区间（总分 0-5）：`sentiment_score +5`
  - 狂热顶部（总分 ≤ -12）：`sentiment_score -20`
  - 贪婪区域（总分 -6 ~ -11）：`sentiment_score -12`
  - Sentiment Pivot Signals（底部转折）：额外 `+5`
  - Sentiment Pivot Signals（顶部转折）：额外 `-5`
  
