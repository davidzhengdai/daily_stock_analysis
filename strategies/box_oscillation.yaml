# Box Range Trading Strategy / 箱体震荡战法
# Buy at box support, sell at box resistance, profit from range-bound oscillation.
# Optimized v2: Algorithmic box detection, volume-profile zones, time-decay factor.

name: box_oscillation
display_name: 箱体震荡
description: 识别价格箱体区间，含算法化箱体检测、量能剖面分析与时间衰减因子，在箱底买入、箱顶减仓。
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [箱体, 箱体震荡]
default_priority: 50
market_regimes: [sideways]

instructions: |
  **箱体震荡战法 v2（Box Range Trading — Expert Enhanced）**
  
  核心升级：算法化箱体识别 + 成交量剖面支撑/阻力强度 + 时间衰减预警 + 突破概率评估。
  
  ---
  
  ## 1. 算法化箱体识别（量化步骤）
  
  使用 `get_daily_history` 获取近 90 日数据，按以下流程识别箱体：
  
  **Step A — 高/低点聚类**：
  - 取 90 日内所有局部高点（前一日和后一日收盘价均低于该日）和局部低点（前一日和后一日均高于该日）。
  - 对高点聚类：价差在 3% 以内视为同一阻力区。
  - 对低点聚类：价差在 3% 以内视为同一支撑区。
  
  **Step B — 有效性评分**：
  | 条件 | 得分 | 必须 |
  |------|------|------|
  | 阻力区触达 ≥ 3 次 | +3 | 是 |
  | 支撑区触达 ≥ 3 次 | +3 | 是 |
  | 最近一次触碰在 30 日内 | +2 | 是 |
  | 箱体持续时间 > 40 个交易日 | +2 | 否 |
  | 箱体宽度 5% ~ 20% | +2 | 是 |
  | MA20 在箱体内运行（非单边趋势） | +1 | 否 |
  
  **总分 ≥ 8 分** → 有效箱体；**5-7 分** → 待确认箱体；**< 5 分** → 不适用箱体策略。
  
  ---
  
  ## 2. 成交量剖面分析（关键新增）
  
  在箱体内部，按价格区间划分成交量分布：
  
  - **高成交量节点（HVN）**：价格在该区间成交密集 → 强支撑/阻力。
  - **低成交量节点（LVN）**：价格在此区间快速穿过 → 弱支撑/阻力，价格容易快速穿越。
  - 箱底附近有 HVN → 强支撑，可正常仓位；箱底附近有 LVN → 弱支撑，减半仓位。
  
  使用 `analyze_trend` 获取成交量数据，判断箱顶/箱底附近的量能堆积情况。
  
  ---
  
  ## 3. 位置判断 + 动态边界
  
  使用 `get_realtime_quote` 获取现价，计算位置比率：
  
  ```
  位置比率 = (现价 - 箱底) / (箱顶 - 箱底)
  ```
  
  | 位置比率 | 区间 | 操作 |
  |----------|------|------|
  | 0% ~ 15% | 箱底区 | 买入/加仓，止损箱底 -3% |
  | 15% ~ 35% | 箱底过渡区 | 可小仓试探 |
  | 35% ~ 65% | 箱中区 | 观望不动 |
  | 65% ~ 85% | 箱顶过渡区 | 准备减仓 |
  | 85% ~ 100% | 箱顶区 | 减仓/清仓 |
  
  ---
  
  ## 4. 时间衰减因子（新增）
  
  箱体持续时间越长，突破概率越大：
  - 箱体持续 < 30 日：早期阶段，波段操作安全性高。
  - 箱体持续 30-60 日：成熟阶段，正常操作。
  - 箱体持续 60-90 日：警惕！突破概率显著上升，缩仓到 1/2。
  - 箱体持续 > 90 日：随时可能突破，仅保留试探仓。
  
  ---
  
  ## 5. Volume-Price Signal Matrix
  
  | 位置 | 量能状态 | 信号 | 操作 |
  |------|----------|------|------|
  | 箱底 | 缩量（量比 < 0.7） | 强买 | 正常仓 |
  | 箱底 | 放量（量比 > 1.5） | 反弹启动 | 可加仓 |
  | 箱底 | 巨量（量比 > 3.0） | 恐慌抛售 | 观望！ |
  | 箱顶 | 缩量 | 强卖 | 清仓 |
  | 箱顶 | 放量 | 突破前兆 | 持仓观察 |
  | 箱顶 | 巨量 | 大概率突破 | 等待突破确认 |
  
  ---
  
  ## 6. 突破确认标准
  
  - **真突破**：连续 2 日收盘突破箱体边界 + 突破日量比 > 1.5。
  - **假突破**：单日触及边界后收盘回到箱内。
  - 向上突破：目标 = 箱顶 + 箱体高度；止损 = 原箱顶。
  - 向下突破：离场，支撑转阻力，目标 = 箱底 - 箱体高度。
  
  **突破概率自检**：
  - 若近 5 次触碰箱顶的次数 > 近 5 次触碰箱底的次数 → 向上突破概率上升。
  - 反之 → 向下突破概率上升。
  
  ---
  
  ## 7. 输出要求
  
  - 箱体顶部价、底部价、宽度百分比。
  - 箱体有效性得分。
  - 当前位置比率及所属区间。
  - 箱顶/箱底成交量剖面（HVN/LVN）。
  - 时间衰减等级。
  - 突破方向概率评估。
  - 建议Position & Stop-Loss位。
  
  ---
  
  ## **Score Adjustments:**
  
  - 箱底区 + 缩量 + 强支撑 HVN：`sentiment_score +12`
  - 箱底区 + 放量启动：`sentiment_score +10`
  - 箱底区 + 巨量恐慌（不买）：`sentiment_score -5`
  - 箱顶区 + 缩量：`sentiment_score -8`（卖出信号）
  - 向上真突破确认：`sentiment_score +15`，转为趋势策略
  - 向下真突破确认：`sentiment_score -15`，离场
  - 箱体时间衰减 > 60 日：`sentiment_score 额外 -3`
  
