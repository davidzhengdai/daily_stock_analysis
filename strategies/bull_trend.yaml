# Default Bull Trend Strategy / 默认多头趋势
# Optimized v2: Trend phase classification, sector alignment, relative strength,
# adaptive position sizing, and trend health scoring.

name: bull_trend
display_name: 默认多头趋势
description: 默认个股分析优先策略，含趋势阶段分类、板块共振校验、相对强度评估与自适应仓位管理。
